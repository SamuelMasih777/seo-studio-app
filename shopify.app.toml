# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "4311d25fd5f1f444206f2518f2bc47df"
name = "SEO Suite AI"
application_url = "https://seo-studio-app.vercel.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products, read_products, read_content, write_content, write_files, read_files, write_online_store_navigation, read_online_store_navigation, read_themes"

[auth]
redirect_urls = [ "https://seo-studio-app.vercel.app/api/auth" ]
